# Example consumer workflow using the XREPORT Action

name: Tests + XREPORT

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/cache@v4
        with:
          path: .xreport
          key: xreport-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            xreport-history-${{ github.ref_name }}-
            xreport-history-

      - run: npm ci
      - name: Run tests
        id: tests
        continue-on-error: true
        run: npx playwright test

      - name: XREPORT gate
        if: always()
        uses: ak3ilb/xqa-xreport@v0.7.0
        with:
          report-dir: ./xreport
          preset: finance-pr
          change-ticket: ${{ github.event.pull_request.title || github.sha }}
          evidence: true
          fail-on-gate: true

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
