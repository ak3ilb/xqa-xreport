name: Hourly sample

# Hourly random practice smokes against https://xqa.io/practice
# (5–10 parallel slots). Reports cleaned by cleanup-sample-artifacts.yml.

on:
  schedule:
    - cron: '0 * * * *'
  # No inputs — Run workflow is one click; count/framework/page are always random.
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: hourly-sample
  cancel-in-progress: false

jobs:
  plan:
    name: Plan matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix
        id: gen
        run: |
          set -euo pipefail
          # Always auto-assign: random 5–10 slots, random framework + page each.
          FRAMEWORKS=(playwright cypress jest vitest mocha)
          PAGES_JSON="scripts/ci/practice-pages.json"
          mapfile -t PAGE_IDS < <(jq -r '.[].id' "${PAGES_JSON}")
          if [[ ${#PAGE_IDS[@]} -lt 1 ]]; then
            echo "No practice pages in catalog" >&2
            exit 1
          fi

          COUNT=$((5 + RANDOM % 6))
          ITEMS='[]'
          for ((i=1; i<=COUNT; i++)); do
            FW="${FRAMEWORKS[$((RANDOM % ${#FRAMEWORKS[@]}))]}"
            PAGE="${PAGE_IDS[$((RANDOM % ${#PAGE_IDS[@]}))]}"
            ITEMS=$(jq -c --argjson slot "$i" --arg fw "$FW" --arg page "$PAGE" \
              '. + [{slot: $slot, framework: $fw, page: $page}]' <<<"${ITEMS}")
          done

          MATRIX=$(jq -c '{include: .}' <<<"${ITEMS}")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          {
            echo "matrix<<EOF"
            echo "${MATRIX}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Hourly XQA practice plan"
            echo ""
            echo "- Samples (auto): **${COUNT}**"
            echo "- Framework / page: **random per slot**"
            echo "- Catalog: ${#PAGE_IDS[@]} pages"
            echo ""
            echo '```json'
            echo "${MATRIX}" | jq .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  sample:
    name: 'slot-${{ matrix.slot }}-${{ matrix.framework }}-${{ matrix.page }}'
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Run single practice page
        env:
          XREPORT_CI_FRAMEWORK: ${{ matrix.framework }}
          XREPORT_CI_PAGE: ${{ matrix.page }}
          XREPORT_CI_SLOT: ${{ matrix.slot }}
          RUNNER_TEMP: ${{ runner.temp }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: node scripts/ci-hourly-sample.js

      - name: Quality gate summary (JSON)
        if: success()
        working-directory: ${{ runner.temp }}/xreport-hourly-${{ matrix.slot }}
        run: |
          set -euo pipefail
          if [[ ! -f xreport/xreport.json ]]; then
            echo "No xreport.json — skip gate summary"
            exit 0
          fi
          set +e
          npx xreport gate ./xreport --json --max-failed=999 > xreport/gate-result.json
          code=$?
          set -e
          {
            echo "### Slot ${{ matrix.slot }} · ${{ matrix.framework }} · ${{ matrix.page }}"
            echo ""
            echo "Gate CLI exit: \`${code}\`"
            echo ""
            if [[ -s xreport/gate-result.json ]]; then
              echo '```json'
              head -c 4000 xreport/gate-result.json
              echo ""
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML report artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: xreport-hourly-${{ matrix.slot }}-${{ matrix.framework }}-${{ matrix.page }}-${{ github.run_id }}
          path: ${{ runner.temp }}/xreport-hourly-${{ matrix.slot }}/xreport/
          retention-days: 1
          if-no-files-found: error

      - name: Wipe temp workdir
        if: always()
        run: rm -rf "${{ runner.temp }}/xreport-hourly-${{ matrix.slot }}"
