name: Hourly sample

# Hourly random practice smokes against https://xqa.io/practice
# (5–10 parallel slots). Reports cleaned by cleanup-sample-artifacts.yml.

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Samples this run (1-10). Use 0 for random 5-10.'
        required: true
        default: '0'
        type: string
      framework:
        description: 'Framework for every sample (or random per sample)'
        required: true
        default: random
        type: choice
        options:
          - random
          - playwright
          - cypress
          - jest
          - vitest
          - mocha
      page:
        description: 'Practice page id (e.g. practice-form), or random'
        required: true
        default: random
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: hourly-sample
  cancel-in-progress: false

jobs:
  plan:
    name: Plan matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix
        id: gen
        env:
          INPUT_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.count || '0' }}
          INPUT_FRAMEWORK: ${{ github.event_name == 'workflow_dispatch' && inputs.framework || 'random' }}
          INPUT_PAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.page || 'random' }}
        run: |
          set -euo pipefail
          FRAMEWORKS=(playwright cypress jest vitest mocha)
          PAGES_JSON="scripts/ci/practice-pages.json"
          mapfile -t PAGE_IDS < <(jq -r '.[].id' "${PAGES_JSON}")
          if [[ ${#PAGE_IDS[@]} -lt 1 ]]; then
            echo "No practice pages in catalog" >&2
            exit 1
          fi

          COUNT_RAW="${INPUT_COUNT:-0}"
          if [[ "${COUNT_RAW}" =~ ^[1-9]$|^10$ ]]; then
            COUNT="${COUNT_RAW}"
          else
            COUNT=$((5 + RANDOM % 6))
          fi

          PIN_FW="${INPUT_FRAMEWORK:-random}"
          PIN_PAGE="${INPUT_PAGE:-random}"
          ITEMS='[]'
          for ((i=1; i<=COUNT; i++)); do
            if [[ "${PIN_FW}" == "random" || -z "${PIN_FW}" ]]; then
              FW="${FRAMEWORKS[$((RANDOM % ${#FRAMEWORKS[@]}))]}"
            else
              FW="${PIN_FW}"
            fi
            if [[ "${PIN_PAGE}" == "random" || -z "${PIN_PAGE}" ]]; then
              PAGE="${PAGE_IDS[$((RANDOM % ${#PAGE_IDS[@]}))]}"
            else
              PAGE="${PIN_PAGE}"
            fi
            ITEMS=$(jq -c --argjson slot "$i" --arg fw "$FW" --arg page "$PAGE" \
              '. + [{slot: $slot, framework: $fw, page: $page}]' <<<"${ITEMS}")
          done

          MATRIX=$(jq -c '{include: .}' <<<"${ITEMS}")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          # Multiline-safe matrix output for fromJson consumers
          {
            echo "matrix<<EOF"
            echo "${MATRIX}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Hourly XQA practice plan"
            echo ""
            echo "- Samples: **${COUNT}**"
            echo "- Framework pin: \`${PIN_FW}\`"
            echo "- Page pin: \`${PIN_PAGE}\`"
            echo "- Catalog: ${#PAGE_IDS[@]} pages"
            echo ""
            echo '```json'
            echo "${MATRIX}" | jq .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  sample:
    name: 'slot-${{ matrix.slot }}-${{ matrix.framework }}-${{ matrix.page }}'
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Run single practice page
        env:
          XREPORT_CI_FRAMEWORK: ${{ matrix.framework }}
          XREPORT_CI_PAGE: ${{ matrix.page }}
          XREPORT_CI_SLOT: ${{ matrix.slot }}
          RUNNER_TEMP: ${{ runner.temp }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: node scripts/ci-hourly-sample.js

      - name: Upload HTML report artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: xreport-hourly-${{ matrix.slot }}-${{ matrix.framework }}-${{ matrix.page }}-${{ github.run_id }}
          path: ${{ runner.temp }}/xreport-hourly-${{ matrix.slot }}/xreport/
          retention-days: 1
          if-no-files-found: error

      - name: Wipe temp workdir
        if: always()
        run: rm -rf "${{ runner.temp }}/xreport-hourly-${{ matrix.slot }}"
